version: "3.9"
services:
  api-gateway:
    build: ./backend/api-gateway
    ports:
      - "5000:5000"
    env_file:
      - ./backend/api-gateway/.env

  auth-service:
    build: ./backend/auth-service
    ports:
      - "5001:5001"
    env_file:
      - ./backend/auth-service/.env

  tourist-service:
    build: ./backend/tourist-service
    ports:
      - "5002:5002"
    env_file:
      - ./backend/tourist-service/.env
